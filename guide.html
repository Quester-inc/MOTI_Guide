<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOTI Studio Guide</title>
</head>
<body>
  <p>새 사용 가이드로 이동합니다.</p>
  <script>
    const page = new URLSearchParams(window.location.search).get("page");
    const target = page ? `index.html?page=${encodeURIComponent(page)}` : "index.html";
    window.location.replace(target);
  </script>
</body>
</html>
